{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Pet Rescue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff1f1,#ffe4ec);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.register-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.1);
    width:100%;
    max-width:450px;
    transition:0.4s ease;
}

.register-card:hover{
    transform:translateY(-8px);
    box-shadow:0 35px 80px rgba(255,107,107,0.25);
}

.btn-main{
    background:#ff6b6b;
    border:none;
    border-radius:30px;
    padding:10px;
    font-weight:600;
}

.btn-main:hover{
    background:#ff4c4c;
}

.google-btn{
    border-radius:30px;
    padding:10px;
    font-weight:600;
}
</style>
</head>

<body>

    

<div class="register-card">
    <h3 class="text-center mb-4 fw-bold">Create Account</h3>
    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning text-center">
            {{ message }}
        </div>
    {% endfor %}
    {% endif %}



    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password1" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn btn-main w-100 mb-3">
            Register
        </button>
    </form>

    <div class="text-center mb-3">
        <span class="text-muted">or</span>
    </div>

    <!-- Google Login -->
    <a href="{% provider_login_url 'google' %}" 
       class="btn btn-outline-danger w-100 google-btn">
        Continue with Google
    </a>
    

    <p class="text-center mt-3">
        Already have an account?
        <a href="/login/" class="fw-semibold text-danger">Login</a>
    </p>
</div>

</body>
</html>
