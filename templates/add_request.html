{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Pet Request - Pet Rescue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
}

/* ===== Background ===== */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.thesprucepets.com/thmb/nAfZqzn_BhMmJ2z2rmbGkO439xM=/4000x0/filters:no_upscale():strip_icc()/spruce-pets-200-types-of-dogs-45a7bd12aacf458cb2e77b841c41abe7.jpg') 
    no-repeat center center/cover;
    filter:blur(3px);
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* ===== Navbar ===== */
.top-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.65);
    color:white;
}

.nav-icons{
    display:flex;
    gap:25px;
    align-items:center;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:6px;
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.nav-item:hover{
    color:#ff6b6b;
}

.logout-btn{
    background:none;
    border:none;
    color:white;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:500;
    transition:0.3s;
}

.logout-btn:hover{
    color:#ff6b6b;
}

/* ===== Form Section ===== */
.form-container{
    min-height:calc(100vh - 70px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.form-card{
    width:850px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    padding:45px;
    border-radius:30px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    color:white;
    animation:fadeIn 0.7s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.form-control{
    border-radius:14px;
    padding:12px;
    background:rgba(255,255,255,0.9);
    border:none;
}

.form-control:focus{
    box-shadow:0 0 0 3px rgba(255,107,107,0.4);
}

label{
    font-weight:600;
}

.btn-main{
    background:linear-gradient(45deg,#ff6b6b,#ff4c4c);
    border:none;
    border-radius:35px;
    padding:15px;
    font-weight:600;
    color:white;
    transition:0.3s;
}

.btn-main:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,107,107,0.5);
}

/* Map styling */
#map{
    height:350px;
    border-radius:20px;
    margin-top:10px;
}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- Navbar -->
<div class="top-nav">
    <h4 class="fw-bold mb-0">🐾 Pet Rescue</h4>

    <div class="nav-icons">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-heart"></i> Favorite
        </a>
        <a href="{% url 'my_requests' %}" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i> Requests
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-bell"></i> Notifications
        </a>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </form>
    </div>
</div>

<!-- Form -->
<div class="form-container">
<div class="form-card">

<h3 class="mb-4 text-center">🐾 Add Pet Request</h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row">

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-paw"></i> Pet Type</label>
            <select name="pet_type" class="form-control" required>
                <option value="">Select</option>
                <option value="dog">Dog</option>
                <option value="cat">Cat</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-dog"></i> Breed</label>
            <input type="text" name="breed" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-palette"></i> Color</label>
            <input type="text" name="color" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-phone"></i> Contact Info</label>
            <input type="text" name="contact_info" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-clock"></i> Incident Date & Time</label>
            <input type="datetime-local" name="incident_datetime" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-image"></i> Pet Image</label>
            <input type="file" name="image" class="form-control">
        </div>

        <!-- Google Map -->
        <div class="col-12 mb-3">
            <label><i class="fa-solid fa-location-dot"></i> Select Location on Map</label>
            <div id="map"></div>
        </div>

        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">

        <div class="col-12 mb-3">
            <label><i class="fa-solid fa-align-left"></i> Description</label>
            <textarea name="description" class="form-control" rows="4"></textarea>
        </div>

        

    </div>

    <button type="submit" class="btn btn-main w-100 mt-3">
        Submit Request
    </button>

</form>

</div>
</div>

<!-- Google Maps Script -->

<script>
    var map = L.map('map').setView([16.5449, 81.5212], 12); // Default Bhimavaram

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;

        if (marker) {
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lng]).addTo(map);
    });
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
