<!DOCTYPE html>
<html>
<head>
    <title>Add Pet Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#fff1f1,#ffe4ec);
            font-family: 'Poppins', sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card-box{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,0.1);
            width:100%;
            max-width:600px;
        }

        .btn-main{
            background:#ff6b6b;
            border:none;
            border-radius:25px;
            padding:10px;
            font-weight:600;
        }

        .btn-main:hover{
            background:#ff4c4c;
        }
    </style>
</head>

<body>

<div class="card-box">
    <h3 class="text-center mb-4">Add Pet Request</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label>Pet Type</label>
            <select name="pet_type" class="form-control" required>
                <option value="dog">Dog</option>
                <option value="cat">Cat</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="mb-3">
            <input type="text" name="breed" class="form-control" placeholder="Breed" required>
        </div>

        <div class="mb-3">
            <input type="text" name="color" class="form-control" placeholder="Color" required>
        </div>

        <div class="mb-3">
            <input type="text" name="location" class="form-control" placeholder="Location" required>
        </div>

        <div class="mb-3">
            <input type="number" step="any" name="latitude" class="form-control" placeholder="Latitude" required>
        </div>

        <div class="mb-3">
            <input type="number" step="any" name="longitude" class="form-control" placeholder="Longitude" required>
        </div>

        <div class="mb-3">
            <input type="text" name="contact_info" class="form-control" placeholder="Contact Info" required>
        </div>

        <div class="mb-3">
            <textarea name="description" class="form-control" placeholder="Description"></textarea>
        </div>

        <div class="mb-3">
            <label>Upload Image</label>
            <input type="file" name="image" class="form-control">
        </div>

        <button type="submit" class="btn btn-main w-100">
            Submit Request
        </button>
    </form>
</div>

</body>
</html>
