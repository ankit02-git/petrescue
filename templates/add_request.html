{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Pet Request</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    min-height:100vh;
    overflow:auto;
}

/* ===== Background ===== */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.thesprucepets.com/thmb/nAfZqzn_BhMmJ2z2rmbGkO439xM=/4000x0/filters:no_upscale():strip_icc()/spruce-pets-200-types-of-dogs-45a7bd12aacf458cb2e77b841c41abe7.jpg') 
    no-repeat center center/cover;
    filter:blur(3px);
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* ===== Navbar ===== */
.top-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.65);
    color:white;
}

.nav-icons{
    display:flex;
    gap:25px;
    align-items:center;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:6px;
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.nav-item:hover{
    color:#ff6b6b;
}

.logout-btn{
    background:none;
    border:none;
    color:white;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:500;
    transition:0.3s;
}

.logout-btn:hover{
    color:#ff6b6b;
}

/* ===== Form Section ===== */
.form-container{
    min-height:calc(100vh - 70px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* Premium Glass Card */
.form-card{
    width:780px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    padding:45px;
    border-radius:30px;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    color:rgb(192, 187, 187);
    animation:fadeIn 0.7s ease-in-out;
}

/* Entrance animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.form-card h3{
    font-weight:700;
}

/* Inputs */
.form-control{
    border-radius:14px;
    padding:12px;
    background:rgba(177, 175, 175, 0.9);
    border:none;
}

.form-control:focus{
    box-shadow:0 0 0 3px rgba(255,107,107,0.4);
}

/* Button */
.btn-main{
    background:linear-gradient(45deg,#ff6b6b,#ff4c4c);
    border:none;
    border-radius:35px;
    padding:15px;
    font-weight:600;
    color:white;
    transition:0.3s;
}

.btn-main:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,107,107,0.5);
}

label{
    font-weight:600;
}

input[type="file"] {
    background: rgba(255,255,255,0.85);
    border-radius: 14px;
    padding: 8px;
}

input[type="file"]::file-selector-button {
    background: rgba(112, 97, 97, 0.85);
    border: none;
    border-radius: 20px;
    color: rgba(255,255,255,0.85);
    padding: 8px 16px;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- ===== Navbar ===== -->
<div class="top-nav">
    <h4 class="fw-bold mb-0">🐾 Pet Rescue</h4>

    <div class="nav-icons">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-heart"></i> Favorite
        </a>

        <a href="{% url 'my_requests' %}" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i> Requests
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-bell"></i> Notifications
        </a>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </form>
    </div>
</div>

<!-- ===== Form ===== -->
<div class="form-container">

<div class="form-card">

<h3 class="mb-4 text-center">🐾 Add Pet Request</h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row">

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-paw"></i> Pet Type</label>
            <input type="text" name="pet_type" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-dog"></i> Breed</label>
            <input type="text" name="breed" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-calendar"></i> Age</label>
            <input type="number" name="age" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-palette"></i> Color</label>
            <input type="text" name="color" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-image"></i> Pet Image</label>
            <input type="file" name="image" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-location-dot"></i> Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label><i class="fa-solid fa-clock"></i> Incident Date & Time</label>
            <input type="datetime-local" name="incident_datetime" class="form-control" required>
        </div>

        <div class="col-12 mb-3">
            <label><i class="fa-solid fa-align-left"></i> Description</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>

    </div>

    <button type="submit" class="btn btn-main w-100 mt-3">
        Submit Request
    </button>

</form>

</div>
</div>

</body>
</html>
