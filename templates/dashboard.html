<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Pet Rescue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff1f1,#ffe4ec);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.dashboard-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.1);
    width:100%;
    max-width:500px;
    text-align:center;
    transition:0.4s ease;
}

.dashboard-card:hover{
    transform:translateY(-8px);
    box-shadow:0 35px 80px rgba(255,107,107,0.25);
}

.btn-main{
    background:#ff6b6b;
    border:none;
    border-radius:30px;
    padding:12px;
    font-weight:600;
    color:white;
    margin-bottom:15px;
}

.btn-main:hover{
    background:#ff4c4c;
    color:white;
}

.logout-link{
    display:inline-block;
    margin-top:15px;
    font-weight:600;
    color:#ff4c4c;
    text-decoration:none;
}

.logout-link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="dashboard-card">

    <h3 class="fw-bold mb-4">
        Welcome {{ user.first_name|default:user.username }} 👋
    </h3>

    <div class="d-grid gap-3">

        <a href="{% url 'add_request' %}" class="btn btn-main">
            🐾 Add Request
        </a>

        <a href="{% url 'my_requests' %}" class="btn btn-main">
            📋 View My Requests
        </a>

        <a href="{% url 'all_pets' %}" class="btn btn-main">
            🐶 View All Pets
        </a>

    </div>

    <a href="{% url 'account_logout' %}" class="logout-link">Logout</a>

    
</div>

</body>
</html>
