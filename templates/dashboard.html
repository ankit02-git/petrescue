{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Pet Rescue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    height:100vh;
    overflow:hidden;
}

/* ===== Background ===== */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background: url('https://media.istockphoto.com/id/1254629167/photo/shih-tzu-dog-wearing-sunglasses-and-red-bowtie.jpg?s=612x612&w=0&k=20&c=Wn9-U5urCKxbENCgmsO4tAmUDuie17lufvkDTi0foIY=') no-repeat center center/cover;
    filter: blur(1px);   /* reduced blur */
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* ===== Navbar ===== */
.top-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
    color:white;
}

.nav-icons{
    display:flex;
    gap:25px;
    align-items:center;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:6px;
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.nav-item:hover{
    color:#ff6b6b;
}

.logout-btn{
    background:none;
    border:none;
    color:white;
    font-weight:500;
    display:flex;
    align-items:center;
    gap:6px;
    transition:0.3s;
}

.logout-btn:hover{
    color:#ff6b6b;
}

/* ===== Dashboard Card ===== */
.dashboard-container{
    height:calc(100vh - 70px);
    display:flex;
    align-items:center;
    padding-left:80px;
}

.dashboard-card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    width:420px;              /* fixed width */
    color:white;
}

.dashboard-card h3{
    font-size:22px;
    font-weight:700;
    word-wrap:break-word;     /* prevent overflow */
    overflow-wrap:break-word;
}

.btn-main{
    background:#ff6b6b;
    border:none;
    border-radius:30px;
    padding:12px;
    font-weight:600;
    color:white;
    margin-bottom:15px;
}

.btn-main:hover{
    background:#ff4c4c;
    color:white;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- Navbar -->
<div class="top-nav">
    <h4 class="fw-bold mb-0">🐾 Pet Rescue</h4>

    <div class="nav-icons">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-heart"></i> Favorite
        </a>

        <a href="{% url 'my_requests' %}" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i> Requests
        </a>

        <a href="#" class="nav-item">
            <i class="fa-solid fa-bell"></i> Notifications
        </a>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </form>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard-container">
    <div class="dashboard-card">

        <h3 class="mb-4">
            Welcome <br>
            {{ request.user.email|cut:"@gmail.com"|title }}👋
        </h3>

        <div class="d-grid gap-3">

            <a href="{% url 'add_request' %}" class="btn btn-main">
                🐾 Add Request
            </a>

            <a href="{% url 'my_requests' %}" class="btn btn-main">
                📋 View My Requests
            </a>

            <a href="{% url 'all_pets' %}" class="btn btn-main">
                🐶 View All Pets
            </a>

        </div>

    </div>
</div>

</body>
</html>
