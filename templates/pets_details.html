<!DOCTYPE html>
<html>
<head>
<title>Pet Detail</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card p-4">
    <h3>{{ pet.pet_type|title }} - {{ pet.breed }}</h3>

    {% if pet.image %}
        <img src="{{ pet.image.url }}" class="img-fluid mb-3" style="max-height:300px;">
    {% endif %}

    <p><strong>Status:</strong> {{ pet.status }}</p>
    <p><strong>Color:</strong> {{ pet.color }}</p>
    <p><strong>Incident Date:</strong> {{ pet.incident_datetime }}</p>
    <p><strong>Description:</strong> {{ pet.description }}</p>
    <p><strong>Contact:</strong> {{ pet.contact_info }}</p>

    {% if pet.latitude and pet.longitude %}
    <iframe
        width="100%"
        height="300"
        style="border:0"
        src="https://www.openstreetmap.org/export/embed.html?bbox={{ pet.longitude|add:'-0.01' }},{{ pet.latitude|add:'-0.01' }},{{ pet.longitude|add:'0.01' }},{{ pet.latitude|add:'0.01' }}&layer=mapnik&marker={{ pet.latitude }},{{ pet.longitude }}">
    </iframe>
    {% endif %}

</div>

</div>

</body>
</html>
