<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Pet Rescue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff1f1,#ffe4ec);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.1);
    width:100%;
    max-width:450px;
    transition:0.4s ease;
}

.login-card:hover{
    transform:translateY(-8px);
    box-shadow:0 35px 80px rgba(255,107,107,0.25);
}

.btn-main{
    background:#ff6b6b;
    border:none;
    border-radius:30px;
    padding:10px;
    font-weight:600;
}

.btn-main:hover{
    background:#ff4c4c;
}

.custom-alert{
    border-radius:15px;
    font-weight:500;
    animation:fadeIn 0.5s ease-in-out;
}

/* Smooth fade in */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>



<div class="login-card">
    <h3 class="text-center mb-4 fw-bold">Welcome Back</h3>

    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger text-center custom-alert">
            {{ message }}
        </div>
    {% endfor %}
   {% endif %} 

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text" name="username" class="form-control"
                   placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control"
                   placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-main w-100 mb-3">
            Login
        </button>
    </form>

    <p class="text-center mt-2">
        <a href="/accounts/password/reset/" class="text-danger fw-semibold">
            Forgot Password?
        </a>
    </p>

    <p class="text-center mt-3">
        Don’t have an account?
        <a href="/register/" class="fw-semibold text-danger">
            Register
        </a>
    </p>
</div>

<script>
    setTimeout(function(){
        let alerts = document.querySelectorAll('.custom-alert');
        alerts.forEach(function(alert){
            alert.style.transition = "opacity 0.5s ease";
            alert.style.opacity = "0";
            setTimeout(() => alert.remove(), 500);
        });
    }, 5000); // 3 seconds
</script>

</body>
</html>
