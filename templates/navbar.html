{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            🐾 PetRescue
        </a>

        <!-- Toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar items -->
        <div class="collapse navbar-collapse" id="navbarContent">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        🏠 Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'all_pets' %}">
                        🐶 All Pets
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'favorites' %}">
                        ❤️ Favorites
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'my_requests' %}">
                        📄 My Requests
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'notifications' %}">
                        🔔 Notifications
                    </a>
                </li>

            </ul>

            <!-- Right side -->
            <div class="d-flex">

                {% if user.is_authenticated %}

                    <span class="navbar-text text-white me-3">
                        Hello, {{ user.username }}
                    </span>

                    <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                        Logout
                    </a>

                {% else %}

                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                        Login
                    </a>

                {% endif %}

            </div>

        </div>
    </div>
</nav>
